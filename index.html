<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Zakat Calculator</title>
    <style>
        :root {
            --primary-color: #1e5631;
            --secondary-color: #4c9a2a;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .calculator-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 5px rgba(76, 154, 42, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        .result-section {
            margin-top: 25px;
            padding: 20px;
            background-color: #e8f5e9;
            border-radius: 8px;
            border-left: 5px solid var(--primary-color);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item strong {
            color: var(--primary-color);
        }

        .status-highlight {
            font-weight: bold;
            font-size: 16px;
            color: #d32f2f;
        }

        .status-applicable {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Zakat Calculator</h2>
    
    
    <div class="row">
        <div class="form-group">
            <label for="goldWeight">Gold Weight (Vhari / Tola):</label>
            <input type="number" id="goldWeight" placeholder="e.g., 7" min="0" step="any">
        </div>
        <div class="form-group">
            <label for="goldRate">Gold Rate (Per Vhari):</label>
            <input type="number" id="goldRate" placeholder="Current market value" min="0" step="any">
        </div>
    </div>

    
    <div class="row">
        <div class="form-group">
            <label for="silverWeight">Silver Weight (Vhari / Tola):</label>
            <input type="number" id="silverWeight" placeholder="e.g., 55" min="0" step="any">
        </div>
        <div class="form-group">
            <label for="silverRate">Silver Rate (Per Vhari):</label>
            <input type="number" id="silverRate" placeholder="Current market value" min="0" step="any">
        </div>
    </div>

    
    <div class="form-group">
        <label for="cash">Cash (In Hand, Bank, or Savings):</label>
        <input type="number" id="cash" placeholder="Total liquid cash" min="0" step="any">
    </div>

    <div class="form-group">
        <label for="business">Business Merchandise / Investments:</label>
        <input type="number" id="business" placeholder="Value of trade goods" min="0" step="any">
    </div>

    <div class="form-group">
        <label for="debts">Deductible Short-Term Liabilities / Debts:</label>
        <input type="number" id="debts" placeholder="Debts due immediately" min="0" step="any">
    </div>

    <button onclick="calculateAll()">Calculate Zakat</button>

    
    <div class="result-section">
        <div class="result-item">
            <span>Total Assets:</span>
            <span><strong id="totalAssetsDisplay">0.00</strong></span>
        </div>
        <div class="result-item">
            <span>Net Wealth:</span>
            <span><strong id="netWealthDisplay">0.00</strong></span>
        </div>
        <div class="result-item">
            <span>Zakat Status:</span>
            <span id="zakatStatusDisplay" class="status-highlight">Not Calculated</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #cccccc; margin: 10px 0;">
        <div class="result-item" style="font-size: 18px; font-weight: bold;">
            <span>Zakat Payable (2.5%):</span>
            <span><strong id="zakatPayableDisplay" style="color: #d32f2f;">0.00</strong></span>
        </div>
    </div>
</div>

<script>
function calculateAll() {
    
    const goldWeight = parseFloat(document.getElementById('goldWeight').value) || 0;
    const goldRate = parseFloat(document.getElementById('goldRate').value) || 0;
    const silverWeight = parseFloat(document.getElementById('silverWeight').value) || 0;
    const silverRate = parseFloat(document.getElementById('silverRate').value) || 0;
    const cash = parseFloat(document.getElementById('cash').value) || 0;
    const business = parseFloat(document.getElementById('business').value) || 0;
    const debts = parseFloat(document.getElementById('debts').value) || 0;

    
    const totalGoldValue = goldWeight * goldRate;
    const totalSilverValue = silverWeight * silverRate;
    
    
    const goldNisabValue = 7.5 * goldRate;
    const silverNisabValue = 52.5 * silverRate;

    
    const totalAssets = totalGoldValue + totalSilverValue + cash + business;
    const netWealth = totalAssets - debts;

    let isZakatApplicable = false;

    
    if (goldWeight > 0 && silverWeight === 0 && cash === 0 && business === 0) {
        const netGoldValue = totalGoldValue - debts;
        
        if (netGoldValue >= goldNisabValue) {
            isZakatApplicable = true;
        }
    } 
    
    else {
        if (netWealth >= silverNisabValue && netWealth > 0) {
            isZakatApplicable = true;
        }
    }

    
    const zakatPayable = isZakatApplicable ? (netWealth * 0.025) : 0;

    
    document.getElementById('totalAssetsDisplay').innerText = totalAssets.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('netWealthDisplay').innerText = netWealth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    
    const statusElement = document.getElementById('zakatStatusDisplay');
    if (isZakatApplicable) {
        statusElement.innerText = "Zakat is Applicable";
        statusElement.className = "status-highlight status-applicable";
    } else {
        statusElement.innerText = "Zakat is Not Applicable";
        statusElement.className = "status-highlight";
        statusElement.style.color = "#777777";
    }
    
    document.getElementById('zakatPayableDisplay').innerText = zakatPayable.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
</script>

</body>
</html>
